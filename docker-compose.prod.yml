##############################################################################
# BMAC Production Docker Compose
#
# Usage:
#   1. Copy .env.docker.example to .env and configure it
#   2. Build:  docker compose -f docker-compose.prod.yml build
#   3. Start:  docker compose -f docker-compose.prod.yml up -d
#   4. Logs:   docker compose -f docker-compose.prod.yml logs -f
#
# Database: MariaDB is the default. See comments below for MySQL/PostgreSQL.
##############################################################################

services:

  #############################################
  # App — serves HTTP traffic via PHP-FPM + Nginx
  #############################################
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    entrypoint: /usr/local/bin/bmac-entrypoint.sh
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:8080"
      - "${APP_SSL_PORT:-443}:8443"
    env_file: .env
    environment:
      SSL_MODE: "off"
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bmac

  #############################################
  # Horizon — queue worker (processes jobs)
  #############################################
  horizon:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: php artisan horizon
    restart: unless-stopped
    env_file: .env
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bmac

  #############################################
  # Scheduler — runs scheduled tasks (cron)
  #############################################
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: php artisan schedule:work
    restart: unless-stopped
    env_file: .env
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bmac

  #############################################
  # Redis — cache + queue backend
  #############################################
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3
      timeout: 5s
    networks:
      - bmac

  #############################################
  # Database — MariaDB (default)
  #
  # For MySQL, replace with:
  #   image: mysql:8.4
  #   (environment variables stay the same)
  #
  # For PostgreSQL, replace with:
  #   image: postgres:17-alpine
  #   environment:
  #     POSTGRES_DB: ${DB_DATABASE}
  #     POSTGRES_USER: ${DB_USERNAME}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #   volumes:
  #     - db-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
  #   Also update .env: DB_CONNECTION=pgsql, DB_PORT=5432
  #############################################
  database:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 5
      timeout: 5s
    networks:
      - bmac

volumes:
  storage:
    driver: local
  redis-data:
    driver: local
  db-data:
    driver: local

networks:
  bmac:
    driver: bridge
